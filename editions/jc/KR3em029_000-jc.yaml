front:
  text: 姚序咽喉昔人方之輿地固險要之區也扼之抗之並制人之命第其事有相背戾者於地爭得之以制勝至夫疾證則隘於此者危矣然亦未嘗不合人居險地以策勝之疾得隘地以藥瘳之客主之形不同攻擊者之情一也夫治兵無常勢而用奇者勝姜維守劍閣鍾會攻之未能克鄧艾由邪徑趣涪吳人於江險磧鐵鎖橫截王浚火燒液之並筏去鐵錐咽喉之用甘桔湯蜀人之劍閣吳人之鎖錐也此脈證通論一書相傳出宋時杭千佛寺僧囊中共十八篇皆精要無類吾友許子槤嘗刊之生人不可計世固不知其用藥禁忌一篇昔人皆昧之所謂吳人蜀人之蔽者也亦猶七國之韓欲援之而欲以折之固必有道在矣因續授之梓而記之道光二十有一年歲在辛丑閏三月吳興姚晏芳林北堂書姚序醫家十三科咽喉居其一誠以氣之出入生死之關事醫者不可不審求也內經曰喉主天氣咽主地氣咳論篇曰心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹厥論篇曰手陽明少陽厥逆發喉痹嗌腫痓脈解篇曰厥陰所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾骨空論篇曰督脈生病治督脈治在骨上甚者在齊下營其上氣有音者治其喉中央在缺盆中者其病上衝喉者治其漸漸者上挾頤也謬刺論篇曰邪客於手少陽之絡令人喉痹邪客於足少陰之絡令人嗌痛不可納食又曰嗌中腫不能納唾時不能出唾考內經所言喉證者凡謂臟腑之氣痹著於其地而已無所謂十八證三十六證也惟靈樞癰疽篇岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞喉半日死則類喉科之乳蛾而屬之癰疽仲景去先聖未遠其金匱玉函所載雜病並無喉證正與內經相合李東垣劉河間為金元巨手所著諸書亦不載是證獨朱丹溪有喉痹一門第以臟腑為主分經施治則亦內經之支也海寧許珊林槤得喉科書一冊於其鄉之世業是醫者題為宋異僧所遺以其篇第考之即所謂十八證也先總論病態而系以藥後詳方證複列用藥禁忌且以甘桔湯為喉證所忌一掃俗醫誤執成方之謬是能獨具手眼者以其喉證為火毒上升用藥降氣瀉火為主即靈樞猛疽之意也其以病起何經用何藥主治即內經丹溪之法也夫善讀軒岐書者固可隔垣洞見何待檢閱之煩然則此書之作蓋為俗醫設也且為無醫設也俗醫與無醫則此書之功偉矣珊林因舊刻之訛重勘而精梓之家兄聖常惜其傳之不廣也郵寄本重鋟因括其大凡於上道光辛丑閏月之望吳興姚衡書於廣州撫使者署之雨春館許序或曰宋有異僧者寓杭之千佛寺遺一囊去寺僧啟之得是書秘不欲傳今尚有能世其術者余曰唯唯否否夫方技之書類多托於畸人異士隱僻怪誕者流神其說以炫人耳目是書苟宋人作也不應有棉花瘡云云此疾元時始入中國何先數百年已能言之鑿鑿如此耶第綜其方論凡夫喉證之虛實緩急辨析造微多所依據則知非近人所能苟非宋亦不出元明間一巨手耳余先後獲四五寫本率為庸妄人竄改塗乙故各各不同及見禾中刊本益紕繆滋甚因即數本中排比參校窮數月之力如理亂絲不啻數棼之而數析之也今年夏手錄定本友人楊子星泉見而韙之星泉今俞附也殆不至阿私所好以貽誤後人者還授之梓以永厥傳簡首仍署曰宋僧原本亦疑以傳疑意爾夫豈敢神其說以炫人耳目哉是為序道光五年乙酉六月海昌許槤撰
