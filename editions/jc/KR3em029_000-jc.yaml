body:
  text: 總論夫喉者吾生氣機出入之門戶瞬息存亡之際性命系焉偶一受病危在須臾迫不及待所貴醫者能識受病之原與夫虛實痰火風寒熱毒之異更於望聞問中參究脈理尤為先務之急自來業喉科者全不講脈所以治之鮮效今試論之假如其脈洪大而實其人氣粗而躁此有餘之證用藥則以散風下氣清火消痰散之者荊芥防風羌活獨活紫蘇是也下之者枳殼枳實青皮厚朴山楂前胡是也清之者山梔黃芩黃柏甚則犀角黃連消痰則以膽星蔞仁杏仁為主若脈洪大而浮軟無力或弦緩而澀其人氣委而靜此不足之證用藥則以涼血生血滋潤消痰涼之者丹皮白芍是也生之者生地當歸是也潤之者苡仁知母花粉是也消痰則以貝母蔞仁杏仁兼用山梔黃芩黃柏犀角黃連或有純是陰脈者或有純是陽脈者當以病治病脈不與焉即以荊芥防風牛蒡射干黃芩枳殼銀花獨活生地丹皮花粉為治再以保命丹或紅內消同服日用吹藥夜用噙藥無不見效更有一種熱病而服熱藥火毒熾甚而發於喉間大寒大熱疼痛不止或舌脹而木伸縮不能飲食難進其脈洪實有力大便不行宜急下之若脈洪弦而浮無力宜涼血行血為主若過用疏風散火之劑恐變別證最稱難治又有一種出外急走遠路脫力而傷肺氣喘息難舒以致喉痛舌脹地閣下腫突如鎖喉之狀內視之非重舌外視之非痰毒寒熱大作痰涎洶湧六脈洪大中空面色發黃而浮初以防風通聖散探之或效一二即以涼血生血順氣之藥治之又有似喉證非喉證者其喉亦痛牙關緊閉胸脅疼痛或腹脹痛四肢攣厥作痛此因受有重傷或用力太過致瘀血凝滯當以行血破瘀為要初起可救過五六日不治又如弱證喉癬雖是肺經之病亦有兼他經而起者何以知之假如喉間紅瘰作痛是肺經火盛之故若頸項之筋有時或左或右作脹而硬氣悶不快此怒氣傷肝左關脈必洪大而弦當清肝火以舒筋涼血為主用藥則以當歸牛膝佐以柴胡黃芩羚羊若兼右關微弱而緩乃脾胃有虧須兼用白芍茯苓此肝脾與肺共病也喉間紅瘰作痛其舌紫色或生刺作痛或作木乾枯是心經受虧無血榮養以致虛火熾盛且兼思慮過度鬱氣所成左寸脈必浮洪當以犀角涼血黃連清火為主佐以當歸生血白芍涼血此心與肺共病也喉間紅瘰作痛滿唇焦裂目熱如燒或作乾嘔是胃經虛火熾盛右關脈必洪弦且緊當以山梔清火黃芩為主佐以當歸生血白芍涼血山藥此胃與肺共病也喉間紅瘰作痛夜間舌乾口苦湯水不進或有咳而無痰更兼滑精者是腎水枯竭虛火上炎兩尺脈必洪數無力當以山藥知母黃柏清火為主佐以花粉潤澤瀉白芍茯苓此腎與肺共病也若夫肺經獨病或吐血而成或嗜酒而發或脾虛而生氣血消散嗽重聲啞喘急痰多聲如曳鋸睡臥不得六脈洪大而浮肺部更甚當以苡仁山藥貝母黃芩蔞仁牛蒡為主佐以當歸白芍熟地茯苓丹皮犀角黃柏知母服之喉痛雖止然不過待日而已更有六脈沉隱神脫氣敗飲食不進步履不前盜汗自汗如雨脾氣溏泄死無疑矣若年老人喉間紅瘰作痛或舌上生刺或破腫或木脹言語不清六脈微洪五至有餘飲食動靜形色神氣如常此血少火盛當以黃芩丹皮茯苓熟地當歸白芍為主佐以元參牛蒡枳殼銀花花粉山藥苡仁甚則加犀角黃連不同前論若小兒痘後或瘧後患乎此當以犀角黃連敗其熱毒更以涼血補血健脾之藥為佐朮草參耆斷不可用此外用藥與大人相同若女人胎前患此者先以安胎為主次以涼血為佐紅內消保命丹忌用余藥無妨產後一月未滿者當以熟地當歸補血枳殼青皮下氣元參射干牛蒡元胡索銀花消腫少加黃芩花粉以清熱紅內消保命丹可用但不宜多吹藥噙藥忌之如經期適來當以破血下氣之藥為主涼血者少用紅內消保命丹噙藥服之亦無忌茲論其大略如此余詳各條通治用藥夫喉證向有三十六法今余列十八證名目雖簡而治法已備要之十八證中又可以風與痰與火概之凡遇此證不論緩急只以下氣消痰為主次則清火涼血若不分先後混亂用藥貽害匪淺今開用藥大概於下惟高明者臨時參用可耳藥用防風前胡丹皮獨活各一錢杏仁蔞仁山楂各三錢車前木通各八分兩劑後加山梔膽星各一錢生地二錢如火未息加黃芩一錢以保命丹紅內消同服誤用黃連半夏生薑桔梗之類難以收功照前方加羌活獨活服幾劑自愈牙關難開須加真北細辛一分單蛾雙蛾至八九日後方可用針刺出毒血未滿十日萬不可刺或有疔瘡根腳紅內消不可用用之反凶煎藥中加地丁草七八錢自愈保命丹可服頸間痰毒須加象貝母草河車猴姜若日久難愈以蛤蟆一個研好硃砂五分灌於中泥裹煨研末服之自消用藥禁忌古有甘桔湯乃清喉之要劑今人見有患喉證者即用之而無疑嗟乎此猶抱薪救火非能愈疾而更增其疾矣何以言之夫喉證乃火毒上升所致須以降氣瀉火為要甘草補中而不瀉火既受其補則火愈熾病愈重矣桔梗引諸藥上行藥既上行則痰與火亦引之而上行勢必喉間壅塞於病更加重矣故小兒驚痰大人痰火桔梗是最忌者本草云升麻引胃中清氣上升又可代犀角似乎可用不知一用其痰火與氣一齊上湧於咽喉之間四肢逆冷喘急異常為害匪淺若在他證猶或可用如鎖喉服之則不治矣半夏雖消痰若喉證痰重者誤用之禍不旋踵蓋此乃治脾家濕滯之痰至於喉證有痰總不外肺中熱火何可以半夏之燥烈治之乎老薑辛辣發散雖喉證亦以發散為主然過用辛辣之味則以火益火大非所宜此五者與喉證關係甚重故特表而出之至別藥之中亦多禁忌惟業醫者審擇用之茲不多贅丸散方藥牛黃解毒丸即噙藥治一切喉風痹閉咳嗽喘急痰涎壅塞胸膈迷悶並口舌等證無不見效牛黃五分青黛一兩飛淨冰片五分雄黃五錢兒茶三錢官硼五錢薄荷三兩另研膽星四兩研細末生蜜和丸如芡實大每噙一丸待其自化嚥下一日夜須噙四丸小兒減半紅內消散治咽喉一切諸證並無名腫毒已潰未潰均可服用厥效如神大蜈蚣去頭足切斷同米炒以米黑為度乳香去油盡沒藥去油盡血竭另研雄黃象貝母穿山甲炒辰砂水飛淨麝香揀去毛皮乾研上藥等分惟麝香少許研細末每服七分小兒減半和煎藥同服酒下亦可保命丹錠子治咽喉口齒新久腫痛並解諸毒磨服神效麝香揀去毛皮乾研三錢辰砂明透者水飛淨三錢冰片梅花大塊一錢珍珠研細末一錢琥珀一錢山豆根一兩熬汁另用文蛤洗淨煅一兩山茨菇洗去毛皮淨焙二兩雄黃鮮明大塊研淨三錢千金子白者去油一兩紅毛大戟浙江紫大戟為上北方綿大戟不堪用去蘆根洗淨焙乾為末一兩五錢上藥研末以糯米粥和山豆根汁打糊為錠每重一錢病輕者一錠重者連服二錠膽冰消毒散初起吹藥血竭一錢膽礬一錢雄黃一錢乳香去油三錢冰片一錢白占二錢燈心灰不拘冰硼散收功吹藥冰片一錢硼砂一錢山豆根二錢五分玉屑散一名五馬破曹治咽喉口舌頸項破爛諸痛皆效薄荷三兩另研官硼三錢五分雄黃三錢兒茶一錢冰片三分上藥研細末貯瓷瓶內臨用挑少許置舌上咀含片刻嚥下日用八九次如鎖喉風口內乾枯牙關緊閉不能咀含者以無根水灌下自能開關生津惟脾虛胃弱者不宜多用鎖喉第一此證因風熱積於胸膈或酒色及鬱怒所致其狀喉上下左右紅紫腫痛或帝丁焦黑腐爛頸項浮腫痰涎壅塞聲響如潮氣急發喘眼目直視額上有汗如珠身汗如雨或泄瀉清水四肢厥冷或腰脅疼痛肚腹脹痛法在不治若脈六七至不論大小至數分明雖甚危險十中可救一二或脈洪大或沉細惟三部混亂即形色神氣如常終為難治初起用吹藥噙藥痰多以萬年青根搗汁和醋攪去痰涎或土牛膝汁或青魚膽汁俱可加減荊防敗毒散脈洪大七八至用之荊芥防風牛蒡連翹膽星獨活前胡枳殼蘇子蔞仁杏仁生地黃芩黃柏山梔元參加原枝燈心二十莖長流水煎和保命丹同服大便不行去荊芥防風加枳實青皮大黃加減柴胡雙解散脈沉隱或二三至用之柴胡前胡羌活獨活枳殼枳實川芎青皮蔞仁杏仁膽星蘇子長流水煎和保命丹同服冬月加麻黃脈七八至而浮洪頭面皮肉浮腫色微紅涕淚交流語言蹇澀或以防風蘇子銀花牛蒡杏仁蔞仁枳殼枳實膽星青皮黃柏黃芩山梔元參和保命丹同服亦有獲效者服荊防敗毒散後肺管脹塞兼咳嗽者即加生地當歸白芍服敗毒散一劑喉痛頓減惟胸膈脹痛牽引脊背再服之即除服三黃湯亦有全愈者蜒蚰同白梅搗爛和丸噙之每見有效誤用大黃巴豆瀉利不止喉證雖愈而胸膈脹悶飲食不進醫復誤作他證治者死重舌第二此證因平日喜食炙爆熱毒之物積熱攻於心脾二經所致其狀舌下腫突生一小舌久之大舌反縮短或脹而紫言語不清飲食不下微作寒熱口中清涎極多即用銅匙將舌捺定用三稜針刺大舌兩旁及舌下金津玉液兩穴各一針可五分許再刺小舌兩旁或出紫血或待清涎流盡方進吹藥噙藥次服煎劑自安藥用荊芥防風連翹獨活前胡射干膽星枳殼元參生地黃芩黃柏銀花花粉長流水煎如刺破清涎出盡亦有弗藥而愈者氣癰第三此證因惱怒傷肝肝血不和以致肺氣壅塞火熾上升發於喉間其狀帝丁之上紅腫作痛或有連及兩邊者寒熱大作初起不宜刺破待六七日後方可針刺或有誤服升提之藥竟不能愈者或有服保命丹紅內消其毒自出者如痰多則以醋攪之強進飲食為妙否則恐變輕為重藥用荊芥防風射干牛蒡連翹烏藥膽星前胡枳殼生地元參黃芩銀花長流水煎痰多加蔞仁氣重加枳實青皮大便不行加黃連甚則加大黃乳蛾第四此證因嗜酒肉熱物過多熱毒積於血分兼之房事太過腎水虧竭致有此發其狀或左或右或紅或白形如乳頭故名乳蛾一邊腫曰單蛾兩邊腫曰雙蛾或前後皆腫白腐作爛曰爛頭乳蛾初起必發寒熱用保命丹紅內消兼煎劑治之藥用荊芥防風射干牛蒡前胡枳殼膽星連翹生地丹皮元參黃柏黃芩銀花長流水煎如火盛加犀角黃連大便閉結加大黃寒熱不止加羌活獨活體虛痰多加蔞仁杏仁貝母有一種名根腳喉風其證日行一穴至七日行七穴喉間發泡時欲嘔吐或一年一發或半年一發或一二月數發根留於中不能盡去一時難愈或云先從腳跟發起至於喉間亦名腳跟喉風發時在左則左足痠軟陰痛有似筋觸牽入喉間在右亦如之治法同乳蛾證亦相似今人每見發有紫泡以為毒物即用刀針開之豈知病之初起毒氣熾盛發之於泡若刺之出血非但不能愈疾加之破傷則病益重矣或問曰亦有用刀針而得愈者何故答曰彼病勢淺火毒不重刺出血少則愈者其偶然耳倘病勢已深火毒極盛設以刀針刺之其誤事也可勝言哉或以寒熱大作誤認感寒即用生薑半夏喉痛益甚蓋薑夏喉證所大忌也詳前用藥禁忌弄舌第五此證因風痰久積於內或勞役過度而生其狀舌出過唇不能言語患者以手時弄其舌故名初起用青魚膽汁攪去其痰急宜以小布針刺少商穴在手大指內側之端去爪甲角如韭菜許白肉際乃肺經穴也出血者易治出黃水者難治腫不消者亦難治藥用枳殼枳實牛蒡連翹射干青皮蘇子膽星防風生地犀角黃芩山梔銀花長流水煎舌捲縮而不能言因乎風寒也舌長寸許而不能收因乎房勞也舌腫滿而不能消因乎七情也舌根腫脹者謂之重舌腫而不柔利者謂之木舌初起急宜醫治遲則不救舌脹滿口痰涎極多亦木舌之一種前方重加大黃芒硝下後自愈纏喉第六此證因風痰濕熱久積於內或食炙爆厚味太多或房勞及抑鬱所致其狀耳下紅腫漸趨項下及結喉之間一邊者輕兩邊者重喉內帝丁左右兩傍如蛇盤之狀有黃白二色黃為黃纏白為白纏急宜刺少商穴出血注見弄舌次用吹藥噙藥男子延至結喉下不治女子延至胸膛不治喉中聲響如雷者不治額鼻有青黑氣頭低痰如膠者不治藥用荊芥防風羌活獨活枳殼連翹膽星蔞仁車前紅花丹皮黃芩元參前胡牛蒡銀花長流水煎和紅內消同服再下保命丹服藥至四五日加當歸白芍生地黃柏土貝母其效甚速啞瘴第七此證因風痰壅滯於咽喉之間其狀口不能言牙關緊閉即用蟾酥化水滴鼻內即開仍以玉屑散吹之再將鵝翎探入喉中攪去風痰即能言矣先進牛黃解毒丸次服荊防敗毒散連進二三劑自愈如面紫舌青唇黑鼻流清涕目赤多淚爪甲俱青者不治骨槽第八此證因憂思郁慮邪毒交乘結聚於太陽經絡或則惱怒傷肝致筋骨緊急思慮傷脾致肌肉結腫膏粱厚味致膿多臭穢其狀始於耳項皮膚間隱隱有核漸如李大便覺腫痛初則堅硬不消久則延爛難愈甚至齒牙墮落牙床腐穢俱在不治初起先用鵝翎探吐風痰次以陳艾灸耳垂下五分七壯再服煎藥加減當歸連翹枳殼生地銀花射干膽星赤芍元參牛蒡元胡索黃芩丹皮長流水煎懸蜞第九此證因上焦熱毒蘊積風痰壅塞而生其狀上顎腫垂形如蛙腹或如雞卵咽喉閉塞痰涎滿舌初治用鵝翎探吐風痰次以吹藥噙藥及荊芥敗毒散加減日久服千金內托散加減千金內托散厚朴荊芥防風連翹羌活獨活白芷膽星枳殼元參蘇子杏仁蔞仁蔥白爛喉癬第十此證因棉花瘡毒未盡而結於咽喉其狀周圍紫暈漸至腐爛爛上則鼻平陷爛下則飲食難進多致不救初起不覺或十日半月始知當以清熱涼血補脾為主佐吞百寶丹二三十服若體弱痰多嗽重聲啞者不治藥用生地花粉黃芩白芍黃柏丹皮銀花元參牛蒡射干防風角刺體弱者加茯苓嗽重加山藥苡仁知母蔞仁杏仁熱甚加犀角黃連十劑後服犀羚貝母膏膏用犀角羚羊角丹皮各八錢當歸元參各五錢黃連黃芩黃柏防風射干荊芥各三錢牛蒡八錢枳殼連翹各六錢土貝一兩茯苓苡仁花粉各五錢煎汁約四大碗濾渣將汁再熬如稀糊納煉蜜半斤收貯瓷罐日服四次在卯巳未亥四時每次半盅以燈心湯摻和送下忌生冷發氣之物體弱者去黃連花粉加白芍陳皮石斛噁心砂仁湯送下如合丸藥去黃連羚羊角荊芥防風日進二次每次二錢百寶丹牙皂一兩銀花三兩硃砂五錢研細末每服六分以冷飯塊三兩水三碗煎至碗半分作二服服在巳午兩時須二十餘服方能見效食時多服豬油麻油以潤肌膚臟腑忌茶酒牛羊麵食蔥蒜等物熱風喉癬第十一此證因勞心過度血衰火盛而致其狀喉間紅筋紅瘰或帝丁兩旁微有疙瘩一起即覺非弱證喉癬可比時作寒熱若食熱毒之物而起不作寒熱於此為別涼血地黃湯生地黃芩丹皮牛蒡元參防風荊芥黃柏花粉赤芍火甚加山梔或犀角黃連弱證喉癬第十二此證因酒色過度或勞碌憂鬱所成其狀喉間紅筋紅瘰蔓延而生津咽疼痛夜間發熱口燥舌乾六脈洪數當以清熱補血為主若動靜飲食如常形色精神不脫無嗽無痰乃血分有熱須涼血破血不宜用補如嗽重聲啞痰多及盜汗不止者不治藥用白芍丹皮黃芩當歸元參生地黃柏銀花花粉大力子初起亦加荊芥防風連翹枳殼病久去之嗽重加知母前胡土貝蔞仁杏仁熱甚加柴胡黃連心火盛加犀角黃連肝火盛加羚羊角泄瀉加白朮茯苓腎水枯竭加山藥澤瀉枸杞五味知母停酸作嘔加砂仁虛甚加苡仁山藥茯苓當歸倍以白芍喉閉第十三此證乃寒邪直中下焦逼其無根失守之火發揚於上以致咽痛卒然喉閉四肢厥冷六脈沉微但必下利清穀口燥咽乾而不思湯飲方是寒證急宜刺少商穴出血注見弄舌再服煎劑若口燥咽乾而渴與此霄壤矣四順理中湯人參白朮甘草乾薑四逆湯附子肉桂甘草乾薑嗆食第十四此證乃熱毒積於心肺二經咽喉乾燥而無津液是以喉中作痛而嗆食難下也急用當歸連翹散加大黃利之若治稍遲則有飛屍癆瘵之患如痰喘治以川桂散加吳茱萸五七粒服後覺心肺間刺痛仍用當歸連翹散當歸連翹散當歸生地黃芩連翹山梔枳殼羌活防風荊芥按當用骨槽門加減法川桂散按此方原本藥品未載發頤第十五此證或傷寒發散未透餘毒積於經絡有與傷寒同發者有不與傷寒同發者其狀耳後紅腫頭重體倦急用千金內托散治之外敷南星膏若發於耳後一寸三分或鼻中流涕咽喉閉塞痰涎壅聚法皆不治南星膏按此方原本藥品未載發於耳後名發頤發於腮邊名穿腮發於地閣下名穿喉皆屬痰毒初起破血消痰降氣其後涼血生血滋陰降火惟燥熱之藥斷不可用刀針圍藥膏藥並忌吹藥噙藥多用為妙懸癰第十六此證乃脾家熱毒外感風熱而成其狀忽於上顎生一紫泡垂下抵舌疼痛異常口不能言舌不能伸頭不能低仰面而立鼻出紅涕若不速治毒入於腦即死急以小刀刺破癰頭出盡紫血不可嚥下用菊花湯漱淨先以菊花葉搗汁一碗和酒送下次進牛黃解毒丸煎以荊防敗毒散加地丁半枝蓮甚效喉菌第十七此證因食膏粱炙爆厚味過多熱毒積於心脾二經上蒸於喉結成如菌面厚色紫軟如豬肺或微痛或木而不痛梗塞喉間飲食有礙須以針刺出紫血者可治鮮血者難治日刺日有漸如蜂窠者不治藥用犀角黃芩丹皮殭蠶射干連翹銀花紅花生地黃連黃柏枳殼獨活元參赤芍大力子或年幼之人患此不疼痛者當以丸藥治之日久自消切忌刀針藥用丹皮獨活防風連翹紅花生地荊芥射干牛蒡前胡枳殼山楂犀角銀花花粉山梔黃芩黃柏元參元胡索蜜丸日服二次每次二錢開水下牙癰第十八此證因勞心過度或食熱毒等物鼓動陽明胃經之火發於牙齦其狀如豆大或如指大紫色腫硬疼痛難忍或頭疼發熱憎寒先服紅內消次進荊防敗毒散和保命丹同服吹藥噙藥多用初起發散後則涼血如不愈乃是體虛當用黃耆白朮當歸柴胡陳皮熟地丹皮芍藥黃芩石斛元參牛蒡山梔凡牙痛或左或右痛無定處者前藥亦治若誤服發散其痛更甚以水醋各半和熱水漱之即止跋上咽喉脈證通論一卷先府君曾於道光辛丑五月刻於廣州卷首有府君手書序二篇工刻精絕宛然真跡惜江浙寇亂板已不存同治十三年冬覲元在川東檢點書簏得初印樣本一冊因續授之梓以廣其傳仍模刻面頁標題年月及署檢用存手澤先府君精通醫學其大略已見序中覲元懵不知醫但據本校錄而已於戲即此藝事之微已不相肖如此況其大者遠者乎是可愧已歸安姚覲元記
